<section class="web-tabs-page bg-white min-vh-100">
  <!-- Header -->
  <div class="d-flex align-items-center justify-content-between border-bottom px-4 py-3">
    <h4 class="mb-0 fw-semibold text-dark">
      {{ pageData.title }}
    </h4>

    <button
      type="button"
      class="btn btn-primary add-btn"
      (click)="createWebTab()"
    >
      {{ pageData.primaryButton.label }}
    </button>
  </div>

  <!-- Table Header -->
  <div class="table-header border-bottom bg-light">
    <div class="row g-0 text-uppercase fw-semibold small">
      <div
        *ngFor="let column of pageData.columns; trackBy: trackByColumn"
        [ngClass]="column.colClass"
        class="px-4 py-2"
      >
        {{ column.label }}
      </div>
    </div>
  </div>

  <!-- Data Rows -->
  <ng-container *ngIf="hasTabs; else emptyState">
    <div
      *ngFor="let tab of pageData.tabs; trackBy: trackByTab"
      class="row g-0 align-items-center border-bottom table-row"
    >
      <div
        *ngFor="let column of pageData.columns; trackBy: trackByColumn"
        [ngClass]="column.colClass"
        class="px-4 py-3"
      >
        <span
          *ngIf="column.key !== 'status'"
          [class.text-primary]="column.key === 'url'"
          [class.text-muted]="column.key === 'lastUpdated'"
        >
          {{ getCellValue(tab, column.key) }}
        </span>

        <span
          *ngIf="column.key === 'status'"
          class="badge rounded-pill"
          [class.text-bg-success]="tab.status === 'Active'"
          [class.text-bg-secondary]="tab.status !== 'Active'"
        >
          {{ getCellValue(tab, column.key) }}
        </span>
      </div>
    </div>
  </ng-container>

  <!-- Empty State -->
  <ng-template #emptyState>
    <div class="empty-state d-flex flex-column align-items-center justify-content-center text-center">
      <p class="empty-text mb-4">
        {{ pageData.emptyState.message }}
      </p>

      <button
        type="button"
        class="btn btn-primary create-btn mb-4"
        (click)="createWebTab()"
      >
        {{ pageData.emptyState.buttonLabel }}
      </button>

      <p class="mb-0 learn-text">
        {{ pageData.emptyState.learnText }}
        <a
          [href]="pageData.emptyState.learnLinkUrl"
          class="text-decoration-none fw-semibold"
        >
          {{ pageData.emptyState.learnLinkText }}
        </a>
      </p>
    </div>
  </ng-template>
</section>
